<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#0d6efd; color:white;">

<h1>📊 Dashboard (Date Wise)</h1>

<canvas id="chart"></canvas>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ dates|safe }},
        datasets: [{
            label: 'Daily Stock',
            data: {{ qtys|safe }}
        }]
    }
});
</script>

</body>
</html>
