<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background:#0b1f3a;color:white;text-align:center;">

<h1>📊 Dashboard</h1>

<canvas id="chart"></canvas>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ names|safe }},
        datasets: [{
            label: 'Stock',
            data: {{ qtys|safe }},
            backgroundColor: 'blue'
        }]
    }
});
</script>

</body>
</html>
