<!DOCTYPE html>
<html>
<head>
<title>Lifebasket Inventory</title>
<style>
body{font-family:Arial;background:#f3f6ff;margin:0}
.header{background:#2563eb;color:white;padding:15px}
.container{padding:20px}

table{width:100%;background:white;border-collapse:collapse}
th,td{padding:10px;border:1px solid #ddd;text-align:center}

.low{background:#ffe5e5}

input{padding:8px;margin:5px}
button{background:#2563eb;color:white;padding:8px;border:none}
a{color:white;margin-left:10px}
</style>
</head>

<body>

<div class="header">
📦 Lifebasket Inventory
<a href="/logout">Logout</a>
<a href="/export">Export CSV</a>
</div>

<div class="container">

<h3>Add Product</h3>
<form action="/add" method="POST">
<input name="name" placeholder="Name">
<input name="qty" placeholder="Qty">
<input name="price" placeholder="Price">
<button>Add</button>
</form>

<br>

<h3>Upload CSV</h3>
<form action="/upload" method="POST" enctype="multipart/form-data">
<input type="file" name="file">
<button>Upload</button>
</form>

<br>

<table>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Price</th>
</tr>

{% for p in products %}
<tr class="{% if p[2] < 5 %}low{% endif %}">
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
