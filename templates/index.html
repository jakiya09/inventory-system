<!DOCTYPE html>
<html>
<head>
<title>Lifebasket Inventory</title>
<style>
body{font-family:Arial;background:#f4f7ff}
.container{width:800px;margin:auto}
.card{background:white;padding:20px;margin-top:20px;border-radius:10px}
input{padding:8px;margin:5px}
table{width:100%;background:white;margin-top:20px}
th,td{padding:10px;border-bottom:1px solid #ddd}
.btn{padding:5px 10px;background:red;color:white;text-decoration:none}
</style>
</head>
<body>

<div class="container">

<h2>📦 Lifebasket Inventory</h2>
<a href="/logout">Logout</a>

<div class="card">
<form method="POST" action="/add">
<input name="name" placeholder="Product Name">
<input name="qty" placeholder="Qty">
<input name="price" placeholder="Price">
<button>Add</button>
</form>
</div>

<table>
<tr>
<th>Name</th><th>Qty</th><th>Price</th><th>Action</th>
</tr>

{% for p in products %}
<tr>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td><a class="btn" href="/delete/{{p[0]}}">Delete</a></td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
