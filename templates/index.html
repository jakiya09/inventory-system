<!DOCTYPE html>
<html>
<head>
<title>Lifebasket Inventory</title>

<style>
body{font-family:Arial;background:#f4f7ff;margin:0}
.header{background:#1c3faa;color:white;padding:15px;display:flex;justify-content:space-between}
.card{background:white;margin:10px;padding:15px;border-radius:10px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:center}
button{background:#1c3faa;color:white;padding:8px;border:none}
input{padding:6px;margin:3px}
.low{color:red;font-weight:bold}
</style>

</head>

<body>

<div class="header">
<h2>📦 Lifebasket Inventory</h2>
<a href="/logout" style="color:white">Logout</a>
</div>

<div class="card">
<form method="POST" action="/add">
<input name="name" placeholder="Product">
<input name="qty" placeholder="Qty">
<input name="price" placeholder="Price">
<button>Add</button>
</form>
</div>

<div class="card">
<a href="/export"><button>Export CSV</button></a>
</div>

<div class="card">
<table>
<tr>
<th>Name</th><th>Qty</th><th>Price</th><th>Action</th>
</tr>

{% for p in products %}
<tr>
<td>{{p[1]}}</td>

<td>
{% if p[2]|int < 5 %}
<span class="low">{{p[2]}} ⚠ LOW</span>
{% else %}
{{p[2]}}
{% endif %}
</td>

<td>{{p[3]}}</td>
<td><a href="/delete/{{p[0]}}">Delete</a></td>
</tr>
{% endfor %}

</table>
</div>

</body>
</html>
