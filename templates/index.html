<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f8ff;
        }

        .title {
            color: #0d6efd;
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.08);
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }

        .btn-warning {
            color: white;
        }

        table {
            background: white;
        }

        thead {
            background: #0d6efd;
            color: white;
        }

        thead th {
            border: none;
        }

        tbody tr:hover {
            background: #eaf2ff;
        }

    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center title mb-4">📦 Inventory System</h2>

    <!-- FORM -->
    <div class="card p-3 mb-4">

        <form method="POST" action="/add" class="row g-2">

            <div class="col-md-4">
                <input type="text" name="name" class="form-control" placeholder="Product Name" required>
            </div>

            <div class="col-md-2">
                <input type="number" name="qty" class="form-control" placeholder="Qty" required>
            </div>

            <div class="col-md-2">
                <input type="number" step="0.01" name="price" class="form-control" placeholder="Price" required>
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Add</button>
            </div>

        </form>

    </div>

    <!-- TABLE -->
    <div class="card p-3">

        <table class="table table-hover align-middle text-center">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p['name'] }}</td>
                    <td>{{ p['qty'] }}</td>
                    <td>৳ {{ p['price'] }}</td>
                    <td>
                        <a href="/sell/{{ p['id'] }}" class="btn btn-warning btn-sm">Sell</a>
                        <a href="/return/{{ p['id'] }}" class="btn btn-info btn-sm text-white">Return</a>
                        <a href="/delete/{{ p['id'] }}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
