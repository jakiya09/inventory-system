<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>📦 Lifebasket Stock Management</h1>

<h2>Total Products: {{ total }}</h2>

<div class="card">
<form method="POST" action="/add">
    <input name="name" placeholder="Product Name">
    <input name="qty" placeholder="Qty">
    <input name="price" placeholder="Price">
    <button>Add</button>
</form>
</div>

<div class="card">
<h3>Upload Screenshot</h3>
<form method="POST" action="/upload-image" enctype="multipart/form-data">
    <input type="file" name="image">
    <button>Upload</button>
</form>
</div>

<div class="card">
<h3>Daily Sales</h3>
<form method="POST" action="/add-daily">
    <input name="name" placeholder="Product Name">
    <input name="qty" placeholder="Sold Qty">
    <button>Update Stock</button>
</form>
</div>

<a href="/dashboard">Go to Dashboard</a>

<table>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Price</th>
</tr>

{% for p in products %}
<tr>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
