<!DOCTYPE html>
<html>
<head>
    <title>Lifebasket Stock Management</title>
    <style>
        body {
            font-family: Arial;
            background: #eef5ff;
            padding: 20px;
        }

        h1 {
            color: #0d6efd;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        button {
            background: #0d6efd;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .low {
            color: red;
        }
    </style>
</head>

<body>

<h1>📦 Lifebasket Stock Management</h1>

<div class="card">
    <h3>Total Products: {{ total }}</h3>
</div>

<div class="card">
<form action="/add" method="post">
    <input name="name" placeholder="Product Name">
    <input name="qty" placeholder="Qty">
    <input name="price" placeholder="Price">
    <button>Add</button>
</form>
</div>

<div class="card">
<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file">
    <button>Upload CSV</button>
</form>

<a href="/export"><button>📤 Export CSV</button></a>
</div>

<table>
<tr>
    <th>Name</th>
    <th>Qty</th>
    <th>Price</th>
    <th>Action</th>
</tr>

{% for p in products %}
<tr>
    <td>{{ p.name }}</td>

    <td class="{% if p.qty < 5 %}low{% endif %}">
        {{ p.qty }}
    </td>

    <td>{{ p.price }}</td>

    <td>
        <form action="/edit/{{p.id}}" method="post" style="display:inline;">
            <input name="name" value="{{p.name}}">
            <input name="qty" value="{{p.qty}}">
            <input name="price" value="{{p.price}}">
            <button>✏️ Edit</button>
        </form>

        <a href="/delete/{{p.id}}">
            <button>❌ Delete</button>
        </a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
