<!DOCTYPE html>
<html>
<head>

<style>

.box{width:300px;margin:100px auto;background:white;padding:20px;border-radius:10px}
input{width:100%;padding:10px;margin:5px 0}

<div class="box">
<h2>Login</h2>

<form method="POST">

<button>Login</button>
</form>

</div>

</body>
</html>
