<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="d-flex justify-content-center align-items-center" style="height:100vh; background:#f4f8ff">

<form method="POST" class="card p-4 shadow" style="width:300px">

    <h4 class="text-center mb-3 text-primary">Login</h4>

    <input name="username" class="form-control mb-2" placeholder="Username">
    <input name="password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100">Login</button>

</form>

</body>
</html>
